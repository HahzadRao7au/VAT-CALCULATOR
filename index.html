<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free and accurate European VAT Calculator. Easily add or remove VAT for UK, Germany, France, Spain, Italy, and more. Fast, responsive, and 100% free tool.">
    <title>EuroVAT Calc - Free European VAT Calculator</title>
    <style>
        :root {
            --primary: #0052cc;
            --secondary: #071e3d;
            --light: #f4f6f9;
            --white: #ffffff;
            --text: #333333;
            --success: #2ed573;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--light); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .calc-container { background: var(--white); width: 100%; max-width: 500px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: var(--secondary); margin-bottom: 20px; font-size: 24px; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1e5eb; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); }
        
        /* Simple Buttons Layout for Mobile Compatibility */
        .btn-group { display: flex; gap: 15px; margin-top: 5px; }
        .type-btn { flex: 1; padding: 12px; background: #f8f9fa; border: 2px solid #e1e5eb; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text); transition: 0.3s; text-align: center; }
        .type-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .results-box { background: var(--secondary); color: white; padding: 20px; border-radius: 12px; margin-top: 25px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; opacity: 0.9; }
        .result-row.total { margin-bottom: 0; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 20px; font-weight: 700; opacity: 1; color: var(--success); }
    </style>
</head>
<body>

<div class="calc-container">
    <h1>🇪🇺 European VAT Calculator</h1>
    
    <div class="form-group">
        <label for="amount">Amount (€)</label>
        <input type="number" id="amount" value="100" placeholder="Enter amount">
    </div>

    <div class="form-group">
        <label for="country">Country (VAT Rate)</label>
        <select id="country">
            <option value="20" selected>United Kingdom (20%)</option>
            <option value="19">Germany (19%)</option>
            <option value="20">France (20%)</option>
            <option value="21">Spain (21%)</option>
            <option value="22">Italy (22%)</option>
            <option value="23">Ireland (23%)</option>
        </select>
    </div>

    <div class="form-group">
        <label>VAT Type</label>
        <div class="btn-group">
            <div id="btn-add" class="type-btn active">Add VAT</div>
            <div id="btn-remove" class="type-btn">Remove VAT</div>
        </div>
    </div>

    <div class="results-box">
        <div class="result-row">
            <span>Net Amount:</span>
            <span id="resNet">€100.00</span>
        </div>
        <div class="result-row">
            <span>VAT Amount:</span>
            <span id="resVat">€20.00</span>
        </div>
        <div class="result-row total">
            <span>Gross Total:</span>
            <span id="resTotal">€120.00</span>
        </div>
    </div>
</div>

<script>
    var currentType = 'add'; // Default type is Add VAT

    function calculate() {
        var amountField = document.getElementById('amount');
        var countryField = document.getElementById('country');
        
        var amount = parseFloat(amountField.value);
        if (isNaN(amount)) { amount = 0; }
        
        var vatRate = parseFloat(countryField.value);
        if (isNaN(vatRate)) { vatRate = 0; }

        var net = 0;
        var vat = 0;
        var total = 0;

        if (currentType === 'remove') {
            // Remove VAT (Amount includes tax)
            total = amount;
            net = total / (1 + (vatRate / 100));
            vat = total - net;
        } else {
            // Add VAT (Amount excludes tax)
            net = amount;
            vat = net * (vatRate / 100);
            total = net + vat;
        }

        document.getElementById('resNet').innerText = '€' + net.toFixed(2);
        document.getElementById('resVat').innerText = '€' + vat.toFixed(2);
        document.getElementById('resTotal').innerText = '€' + total.toFixed(2);
    }

    // Button toggle functionality
    document.getElementById('btn-add').onclick = function() {
        currentType = 'add';
        document.getElementById('btn-add').className = 'type-btn active';
        document.getElementById('btn-remove').className = 'type-btn';
        calculate();
    };

    document.getElementById('btn-remove').onclick = function() {
        currentType = 'remove';
        document.getElementById('btn-remove').className = 'type-btn';
        document.getElementById('btn-add').className = 'type-btn';
        document.getElementById('btn-remove').className = 'type-btn active';
        calculate();
    };

    // Live input inputs
    document.getElementById('amount').oninput = calculate;
    document.getElementById('amount').onkeyup = calculate;
    document.getElementById('country').onchange = calculate;

    // Initial run
    calculate();
</script>

</body>
</html>
